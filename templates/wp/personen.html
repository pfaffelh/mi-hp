{% extends config['skel_name'] %} {% block content %}
<div style="display:flex; flex-direction:row; flex-wrap:wrap; gap:12px; align-items:center;">

{% for k1 in data %} 

  <a href="#{{k1['gruppe']}}"
     style="display:inline-flex; align-items:center; justify-content:center;
            padding:5px 9px; border:2px solid #000; text-decoration:none;">
    {{ k1["gruppe"]|markdown }}
  </a>
{% endfor %}
</div>

<br>
<br>
<br>

<h3 class="wp-block-heading">
  <h1>{{ config['titel'] }}</h1>
</h3>

<div
  class="[&amp;&gt;*]:bl-relative last:[&amp;&gt;*.bl-absolute]:bl-absolute [&amp;&gt;*]:bl-z-20 last:[&amp;&gt;*]:bl-z-10 bl-relative bl-overflow-x-clip [.wp-block-ufr-section_&amp;]:bl-overflow-x-visible bl-bg-transparent bl-text-inherit dark:bl-bg-transparent dark:bl-text-inherit alignfull wp-block-ufr-section has-global-padding is-layout-constrained wp-block-section-is-layout-constrained"
>
  {% for k1 in data %} 

<h3 id = "{{ k1['gruppe']}}"" class="wp-block-heading">{{ k1["gruppe"]|markdown }}</h3>
  <h4
    class="wp-block-heading has-text-align-left"
    id="block-0d8febea-81f3-4fa4-b1cc-8bee832ee085"
  >
  </h4>
  <figure class="wp-block-table">
    <table class="has-fixed-layout">
      <tbody>
        {% for p in k1["members"] %}
        <tr>
          <td>
        {{ p["name"] | safe }}
            <a href="mailto:{{ p['mail'] }}"> ✉</a>
          </td>
          <td>
            {% if p["tel"] %}
            Tel: {{ p["tel"] }}
            {% endif %}
          </td>
          <td>
            {% if p["raum"] %}
            Raum {{ p["raum"] }} 
            {% endif %}
            {% if p["raum"] and p["kommentar"]%}
            <br>
            {% endif %}
            {% if p["kommentar"] %}
            {{ p["kommentar"] }} 
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </figure>
  {% endfor %}
</div>

{% endblock %}
